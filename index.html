<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#412402">
<title>Bananísimo · Gestión</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cacao:#412402;--dorado:#BA7517;--banano:#EF9F27;
  --crema:#FAEEDA;--crema-dark:#f0e0c0;--hoja:#3B6D11;--rojo:#c0392b;--amarillo:#d4a017;
  --bg:#f5f0e8;--white:#fff;--text:#2C2C2A;--text-muted:#888780;
  --border:rgba(44,44,42,0.12);--border-strong:rgba(44,44,42,0.22);
  --radius:14px;--radius-sm:9px;
}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;max-width:430px;margin:0 auto;padding-bottom:80px;}
.topbar{background:var(--cacao);padding:14px 18px 12px;position:sticky;top:0;z-index:100;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:20px;font-weight:700;color:var(--banano);}
.logo span{color:var(--crema);}
.cycle-pill{background:rgba(239,159,39,0.18);border:0.5px solid rgba(239,159,39,0.35);color:var(--banano);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.06em;text-transform:uppercase;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:0.5px solid var(--border-strong);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-family:'Quicksand',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;transition:color 0.15s;position:relative;}
.nav-btn.active{color:var(--dorado);}
.nav-btn svg{width:20px;height:20px;}
.nav-badge{position:absolute;top:6px;right:calc(50% - 16px);background:var(--rojo);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.screen{display:none;padding:16px;}.screen.active{display:block;}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;transition:opacity 0.3s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.loading-logo{font-size:28px;font-weight:700;color:var(--cacao);}
.loading-logo span{color:var(--dorado);}
.loading-sub{font-size:12px;color:var(--text-muted);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.spinner{width:28px;height:28px;border:3px solid var(--crema-dark);border-top-color:var(--dorado);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-banner{background:#fff3cd;border:0.5px solid #ffc107;border-radius:var(--radius-sm);padding:12px 14px;margin:0 0 12px;font-size:13px;color:#664d03;font-weight:600;display:none;line-height:1.5;}
.error-banner.show{display:block;}
/* CONFIG */
.config-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px;margin:16px;}
.config-title{font-size:18px;font-weight:700;color:var(--cacao);margin-bottom:6px;}
.config-sub{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:18px;}
.config-label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.config-input{width:100%;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:11px 13px;font-family:'Quicksand',sans-serif;font-size:13px;font-weight:600;color:var(--text);background:var(--white);outline:none;margin-bottom:14px;transition:border-color 0.15s;}
.config-input:focus{border-color:var(--dorado);}
.config-note{background:var(--crema);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--cacao);line-height:1.65;margin-bottom:16px;}
/* CARDS */
.card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;}
.sec-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;display:block;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
.stat-val{font-size:24px;font-weight:700;color:var(--cacao);line-height:1;margin-bottom:3px;}
.stat-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
.stat-sub{font-size:11px;color:var(--dorado);font-weight:600;margin-top:2px;}
/* WEEK HEADER */
.week-header{background:var(--cacao);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;}
.wh-label{font-size:11px;color:var(--banano);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px;}
.wh-title{font-size:16px;font-weight:700;color:var(--crema);}
.nav-arrow{background:rgba(255,255,255,0.14);border:0.5px solid rgba(255,255,255,0.25);color:var(--crema);border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer;font-family:monospace;}
.nav-arrow:disabled{opacity:0.25;cursor:default;}
/* CAPACITY */
.capacity-bar-wrap{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px;}
.cap-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cap-label{font-size:13px;font-weight:700;color:var(--cacao);}
.cap-count{font-size:22px;font-weight:700;color:var(--cacao);}
.cap-count span{font-size:13px;color:var(--text-muted);font-weight:500;}
.bar-track{background:#F1EFE8;border-radius:20px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:20px;background:var(--dorado);transition:width 0.5s;}
.bar-fill.warn{background:var(--rojo);}
.bar-slots{display:flex;gap:6px;margin-top:10px;}
.slot{flex:1;height:6px;border-radius:3px;background:#F1EFE8;}
.slot.used{background:var(--dorado);}
.slot.used.warn{background:var(--rojo);}
/* STAGE PIPELINE */
.stage-track{display:flex;align-items:center;gap:0;margin-bottom:14px;overflow-x:auto;padding:2px 0;}
.stage-track::-webkit-scrollbar{display:none;}
.stage-step{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.stage-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border-strong);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;z-index:1;}
.stage-dot.done{background:var(--hoja);border-color:var(--hoja);color:#fff;}
.stage-dot.current{background:var(--dorado);border-color:var(--dorado);color:#fff;}
.stage-dot.cancelled{background:var(--rojo);border-color:var(--rojo);color:#fff;}
.stage-name{font-size:9px;font-weight:700;color:var(--text-muted);margin-top:4px;text-align:center;max-width:44px;letter-spacing:0.03em;}
.stage-name.done{color:var(--hoja);}
.stage-name.current{color:var(--dorado);}
.stage-name.cancelled{color:var(--rojo);}
.stage-line{flex:1;height:2px;background:#F1EFE8;min-width:12px;}
.stage-line.done{background:var(--hoja);}
/* ORDER CARDS */
.order-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:8px;cursor:pointer;transition:background 0.15s;}
.order-card:active{background:var(--crema);}
.order-card-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;}
.order-avatar{width:38px;height:38px;border-radius:50%;background:var(--crema);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--cacao);flex-shrink:0;border:0.5px solid var(--border);}
.order-body{flex:1;min-width:0;}
.order-name{font-size:14px;font-weight:700;color:var(--cacao);margin-bottom:2px;}
.order-detail{font-size:12px;color:var(--text-muted);margin-bottom:5px;}
.order-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.order-price{font-size:15px;font-weight:700;color:var(--cacao);flex-shrink:0;padding-top:2px;}
.tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.05em;}
.tag-recibido{background:#e8f4fd;color:#1a5276;}
.tag-horneado{background:#fef9e7;color:#7d6608;}
.tag-enfriado{background:#eaf2ff;color:#1a3a6b;}
.tag-empacado{background:#f0e6ff;color:#6c3483;}
.tag-entregado{background:#d5f5e3;color:#1e8449;}
.tag-cancelado{background:#fde8e8;color:#922b21;}
.tag-pagado{background:#d5f5e3;color:#1e8449;}
.tag-parcial{background:#fef9e7;color:#7d6608;}
.tag-sinpago{background:#fde8e8;color:#922b21;}
.tag-prod{background:var(--crema);color:var(--cacao);}
.order-cycle-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--cacao);color:var(--banano);margin-left:4px;}
/* MINI STAGE IN CARD */
.mini-stage{display:flex;align-items:center;gap:3px;}
.mini-dot{width:8px;height:8px;border-radius:50%;background:#F1EFE8;flex-shrink:0;}
.mini-dot.done{background:var(--hoja);}
.mini-dot.current{background:var(--dorado);}
.mini-dot.cancelled{background:var(--rojo);}
.mini-line{flex:1;height:1.5px;background:#F1EFE8;min-width:6px;}
.mini-line.done{background:var(--hoja);}
/* FORM */
.form-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.form-title{font-size:17px;font-weight:700;color:var(--cacao);margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.form-input{width:100%;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:11px 13px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:var(--white);outline:none;transition:border-color 0.15s;-webkit-appearance:none;}
.form-input:focus{border-color:var(--dorado);}
select.form-input{cursor:pointer;}
.qty-row{display:flex;align-items:center;gap:12px;}
.qty-btn{width:40px;height:40px;border-radius:50%;background:var(--crema);border:0.5px solid var(--border-strong);font-size:22px;font-weight:700;color:var(--cacao);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qty-btn:active{background:var(--crema-dark);}
.qty-display{font-size:24px;font-weight:700;color:var(--cacao);min-width:32px;text-align:center;}
.btn-primary{width:100%;background:var(--cacao);color:var(--banano);border:none;border-radius:var(--radius-sm);padding:14px;font-family:'Quicksand',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
/* FILTERS */
.filter-row{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;font-family:'Quicksand',sans-serif;font-size:11px;font-weight:700;padding:6px 12px;border-radius:20px;border:0.5px solid var(--border-strong);background:var(--white);color:var(--text-muted);cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;}
.filter-chip.active{background:var(--cacao);color:var(--banano);border-color:var(--cacao);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(65,36,2,0.55);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--white);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#D3D1C7;border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:20px;font-weight:700;color:var(--cacao);margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:18px;}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #F1EFE8;}
.modal-row:last-of-type{border-bottom:none;}
.modal-row-label{font-size:13px;color:var(--text-muted);font-weight:600;}
.modal-row-val{font-size:13px;font-weight:700;color:var(--cacao);text-align:right;max-width:60%;}
.modal-actions{display:flex;flex-direction:column;gap:8px;margin-top:18px;}
.btn-status{width:100%;padding:13px;border-radius:var(--radius-sm);font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:opacity 0.15s;}
.btn-status:active{opacity:0.8;}
.btn-status:disabled{opacity:0.5;cursor:not-allowed;}
.btn-next{background:var(--cacao);color:var(--banano);}
.btn-edit{background:var(--crema);color:var(--cacao);border:0.5px solid var(--border-strong)!important;}
.btn-cancel-stage{background:#fde8e8;color:#922b21;}
.btn-danger{background:transparent;color:#999;border:0.5px solid #ddd;font-size:12px;padding:10px;}
.btn-close-modal{background:transparent;color:var(--text-muted);border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:12px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:4px;}
/* STAGE SELECTOR en modal */
.stage-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.stage-opt{padding:9px 4px;border-radius:var(--radius-sm);border:0.5px solid var(--border-strong);background:var(--white);font-family:'Quicksand',sans-serif;font-size:11px;font-weight:700;color:var(--text-muted);cursor:pointer;text-align:center;text-transform:uppercase;letter-spacing:0.04em;transition:all 0.15s;}
.stage-opt.active{border-width:1.5px;}
/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--cacao);color:var(--crema);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;white-space:nowrap;opacity:0;transition:opacity 0.2s;pointer-events:none;}
.toast.show{opacity:1;}
/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-state .e-icon{font-size:40px;margin-bottom:12px;}
.empty-state .e-title{font-size:16px;font-weight:700;color:var(--cacao);margin-bottom:6px;}
.empty-state .e-text{font-size:13px;line-height:1.6;}
/* STOCK */
.ing-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:8px;cursor:pointer;transition:background 0.15s;}
.ing-card:active{background:var(--crema);}
.ing-card.status-critico{border-left:3px solid var(--rojo);}
.ing-card.status-alerta{border-left:3px solid var(--amarillo);}
.ing-card.status-ok{border-left:3px solid var(--hoja);}
.ing-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.ing-name{font-size:14px;font-weight:700;color:var(--cacao);}
.ing-meta{font-size:11px;color:var(--text-muted);margin-top:1px;}
.ing-stock-val{font-size:16px;font-weight:700;text-align:right;}
.ing-stock-val.critico{color:var(--rojo);}
.ing-stock-val.alerta{color:var(--amarillo);}
.ing-stock-val.ok{color:var(--hoja);}
.ing-bar-track{background:#F1EFE8;border-radius:20px;height:6px;overflow:hidden;margin-bottom:5px;}
.ing-bar-fill{height:100%;border-radius:20px;transition:width 0.4s;}
.ing-bar-fill.critico{background:var(--rojo);}
.ing-bar-fill.alerta{background:var(--amarillo);}
.ing-bar-fill.ok{background:var(--hoja);}
.ing-bottom{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);font-weight:600;}
.alert-banner{background:#fdecea;border:0.5px solid #f5c6cb;border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px;cursor:pointer;}
.alert-banner-title{font-size:13px;font-weight:700;color:var(--rojo);margin-bottom:4px;}
.alert-banner-text{font-size:12px;color:#721c24;line-height:1.5;}
/* PAGOS */
.pago-progress{background:#F1EFE8;border-radius:20px;height:8px;overflow:hidden;margin:10px 0 4px;}
.pago-fill{height:100%;border-radius:20px;background:var(--hoja);transition:width 0.4s;}
.payment-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid #F1EFE8;}
.payment-row:last-child{border-bottom:none;}
.payment-method{font-size:12px;font-weight:700;color:var(--cacao);}
.payment-amount{font-size:14px;font-weight:700;color:var(--hoja);}
.payment-date{font-size:11px;color:var(--text-muted);}
.method-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.method-pill{flex:1;min-width:80px;padding:9px 8px;border-radius:var(--radius-sm);border:0.5px solid var(--border-strong);background:var(--white);font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;text-align:center;}
.method-pill.active{background:var(--cacao);color:var(--banano);border-color:var(--cacao);}
/* FINANCE */
.finance-header{background:linear-gradient(135deg,#2c1a08,var(--cacao));border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.finance-main-val{font-size:32px;font-weight:700;color:var(--banano);line-height:1;}
.finance-main-label{font-size:11px;color:rgba(250,238,218,0.7);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}
.finance-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #F1EFE8;}
.finance-row:last-child{border-bottom:none;}
.finance-row-label{font-size:13px;color:var(--text-muted);font-weight:600;}
.finance-row-val{font-size:14px;font-weight:700;}
.finance-row-val.green{color:var(--hoja);}
.finance-row-val.red{color:var(--rojo);}
.order-finance-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;}
.order-finance-row:active{background:var(--crema);}
.ofr-name{font-size:13px;font-weight:700;color:var(--cacao);}
.ofr-detail{font-size:11px;color:var(--text-muted);margin-top:2px;}
.ofr-right{text-align:right;}
.ofr-ganancia{font-size:14px;font-weight:700;}
.ofr-ganancia.pos{color:var(--hoja);}
.ofr-ganancia.neg{color:var(--rojo);}
.progress-bar-wrap{background:#F1EFE8;border-radius:20px;height:8px;overflow:hidden;margin:6px 0;}
.progress-bar-fill{height:100%;border-radius:20px;transition:width 0.4s;}
/* VIEW TABS */
.view-tabs{display:flex;gap:6px;margin-bottom:14px;}
.view-tab{flex:1;padding:8px 4px;border-radius:var(--radius-sm);border:0.5px solid var(--border-strong);background:var(--white);font-family:'Quicksand',sans-serif;font-size:11px;font-weight:700;color:var(--text-muted);cursor:pointer;text-align:center;text-transform:uppercase;letter-spacing:0.05em;}
.view-tab.active{background:var(--cacao);color:var(--banano);border-color:var(--cacao);}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">Banan<span>í</span>simo</div>
  <div class="loading-sub">Cargando...</div>
  <div class="spinner"></div>
</div>

<div id="configScreen" style="display:none;">
  <div style="background:var(--cacao);padding:14px 18px 12px;">
    <div class="logo">Banan<span>í</span>simo</div>
  </div>
  <div class="config-card">
    <div class="config-title">Conectar con Supabase</div>
    <div class="config-sub">Ingresá las credenciales de tu proyecto. Solo se guardan en este dispositivo.</div>
    <div class="config-note"><strong>¿Dónde?</strong> Supabase → Settings → API Keys → Project URL + Publishable key</div>
    <label class="config-label">Project URL</label>
    <input class="config-input" id="cfgUrl" type="url" placeholder="https://xxxx.supabase.co">
    <label class="config-label">Publishable Key (anon)</label>

<script>
// ── CONSTANTES ────────────────────────────────────────────────
const MAX_SEMANA=8, MAX_DIA=4;
const CYCLES=[{id:'mar',label:'Martes',entrega:'Miércoles'},{id:'jue',label:'Jueves',entrega:'Viernes'}];
const METODOS={sinpe:'SINPE',efectivo:'Efectivo',transferencia:'Transferencia'};
const STAGES=['recibido','horneado','enfriado','empacado','entregado'];
const STAGE_LABEL={recibido:'Recibido',horneado:'Horneado',enfriado:'Enfriado',empacado:'Empacado',entregado:'Entregado',cancelado:'Cancelado'};
const STAGE_ICON={recibido:'📋',horneado:'🔥',enfriado:'❄️',empacado:'📦',entregado:'✅',cancelado:'✗'};
const STAGE_COLOR={
  recibido:{bg:'#e8f4fd',color:'#1a5276'},horneado:{bg:'#fef9e7',color:'#7d6608'},
  enfriado:{bg:'#eaf2ff',color:'#1a3a6b'},empacado:{bg:'#f0e6ff',color:'#6c3483'},
  entregado:{bg:'#d5f5e3',color:'#1e8449'},cancelado:{bg:'#fde8e8',color:'#922b21'}
};

// ── ESTADO ────────────────────────────────────────────────────
let sb=null, products=[], allOrders=[], ingredients=[], allPayments=[], productMaterials=[];
let currentFilter='recibido', newQty=1, currentOrderId=null, currentIngId=null;
let currentScreen='dashboard', paymentMethod='sinpe', ingMoveType='compra';
let dashboardView='week', dashboardWeekOffset=0, dashboardMonthOffset=0, customFrom='', customTo='';
let shoppingList=[]; // {id, name, unit, stock, min_stock, warn_stock, status}
let shoppingListOpen=false;
let stockTab='ingrediente'; // 'ingrediente' | 'material'

// ── CONFIG ────────────────────────────────────────────────────
function loadConfig(){return{url:localStorage.getItem('sb_url')||'',key:localStorage.getItem('sb_key')||''};}
function saveConfig(){
  const url=document.getElementById('cfgUrl').value.trim();
  const key=document.getElementById('cfgKey').value.trim();
  if(!url||!key){showToast('⚠️ Completá los dos campos');return;}
  localStorage.setItem('sb_url',url);localStorage.setItem('sb_key',key);initApp();
}

async function initApp(){
  const{url,key}=loadConfig();
  if(!url||!key){hideEl('loadingOverlay');showEl('configScreen');return;}
  try{
    sb=supabase.createClient(url,key);
    const[r1,r2,r3,r4,r5]=await Promise.all([
      sb.from('products').select('*').eq('active',true).order('price'),
      sb.from('orders').select('*').order('created_at',{ascending:false}).limit(500),
      sb.from('ingredients').select('*').order('name'),
      sb.from('payments').select('*').order('created_at',{ascending:false}),
      sb.from('product_materials').select('*'),
    ]);
    if(r1.error)throw r1.error;
    if(r2.error)throw r2.error;
    products=r1.data||[];allOrders=r2.data||[];
    ingredients=r3.data||[];allPayments=r4.data||[];
    productMaterials=r5.data||[];
    hideEl('loadingOverlay');showEl('mainApp');
    updateCyclePill();updateStockBadge();
    // Inicializar lista de compras con ingredientes ya en alerta
    checkShoppingList();
    renderDashboard();
    // Realtime
    sb.channel('rt')
      .on('postgres_changes',{event:'*',schema:'public',table:'orders'},p=>{
        if(p.eventType==='INSERT')allOrders.unshift(p.new);
        else if(p.eventType==='UPDATE'){const i=allOrders.findIndex(o=>o.id===p.new.id);if(i>=0)allOrders[i]=p.new;else allOrders.unshift(p.new);}
        else allOrders=allOrders.filter(o=>o.id!==p.old.id);
        rerenderCurrent();
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'payments'},p=>{
        if(p.eventType==='INSERT')allPayments.unshift(p.new);
        else if(p.eventType==='UPDATE'){const i=allPayments.findIndex(x=>x.id===p.new.id);if(i>=0)allPayments[i]=p.new;else allPayments.unshift(p.new);}
        else allPayments=allPayments.filter(x=>x.id!==p.old.id);
        rerenderCurrent();
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'ingredients'},p=>{
        if(p.eventType==='INSERT')ingredients.push(p.new);
        else if(p.eventType==='UPDATE'){const i=ingredients.findIndex(x=>x.id===p.new.id);if(i>=0)ingredients[i]=p.new;}
        else ingredients=ingredients.filter(x=>x.id!==p.old.id);
        updateStockBadge();rerenderCurrent();
      })
      .subscribe();
  }catch(e){console.error(e);hideEl('loadingOverlay');showEl('configScreen');showToast('❌ Error de conexión');}
}

// ── HELPERS ───────────────────────────────────────────────────
function showEl(id){const el=document.getElementById(id);if(el){el.style.display='block';el.classList.remove('hidden');}}
function hideEl(id){const el=document.getElementById(id);if(el){el.classList.add('hidden');setTimeout(()=>{if(el.classList.contains('hidden'))el.style.display='none';},350);}}
function getWeekKey(d){
  // Convertir a fecha local evitando desfase UTC
  let x;
  if(!d){x=new Date();}
  else if(typeof d==='string'){x=new Date(d.length===10?d+'T12:00:00':d);}
  else{x=new Date(d);}
  // Usar fecha local
  const localY=x.getFullYear(),localM=x.getMonth(),localD=x.getDate();
  const tmp=new Date(localY,localM,localD);
  const day=tmp.getDay();
  const diff=day===0?-6:1-day;
  tmp.setDate(tmp.getDate()+diff);
  return tmp.getFullYear()+'-'+String(tmp.getMonth()+1).padStart(2,'0')+'-'+String(tmp.getDate()).padStart(2,'0');
}
function getOffsetWeekKey(offset){
  const d=new Date();
  d.setDate(d.getDate()+offset*7);
  const y=d.getFullYear(),m=d.getMonth(),day=d.getDate();
  return getWeekKey(y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0'));
}
function getMonthRange(offset){
  const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+offset);
  const y=d.getFullYear(),m=d.getMonth();
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return{from:new Date(y,m,1).toISOString().slice(0,10),to:new Date(y,m+1,0).toISOString().slice(0,10),label:months[m]+' '+y};
}
function ordersInRange(from,to){
  return allOrders.filter(o=>{
    const d=(o.order_date||o.week_key||o.created_at).slice(0,10);
    return d>=from&&d<=to;
  });
}
function weekOrders(wk){
  return allOrders.filter(o=>{
    const d=o.order_date||o.week_key||o.created_at.slice(0,10);
    return getWeekKey(d.slice(0,10))===wk;
  });
}
// Pedidos para dashboard: semana actual + pendientes de semanas anteriores
function dashboardOrders(wk){
  const thisWeek=allOrders.filter(o=>{
    const d=o.order_date||o.week_key||o.created_at.slice(0,10);
    return getWeekKey(d.slice(0,10))===wk;
  });
  // Agregar pedidos activos (no cancelados, no entregados) de semanas anteriores
  const pending=allOrders.filter(o=>{
    const d=o.order_date||o.week_key||o.created_at.slice(0,10);
    if(getWeekKey(d.slice(0,10))===wk)return false; // ya incluido
    return o.stage!=='cancelado'&&o.stage!=='entregado';
  });
  // Combinar sin duplicar
  const ids=new Set(thisWeek.map(o=>o.id));
  return [...thisWeek,...pending.filter(o=>!ids.has(o.id))];
}
function activeOrders(orders){return orders.filter(o=>o.stage!=='cancelado');}
function orderPayments(id){return allPayments.filter(p=>p.order_id===id);}
function orderPaidAmount(id){return orderPayments(id).reduce((s,p)=>s+p.amount,0);}
function ingStatus(i){if(i.stock<=i.min_stock)return'critico';if(i.stock<=i.warn_stock)return'alerta';return'ok';}
function formatPrice(n){return'₡'+Number(n||0).toLocaleString('es-CR');}
function getInitials(n){return(n||'?').trim().split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function navWeek(delta){dashboardWeekOffset+=delta;if(dashboardWeekOffset>0)dashboardWeekOffset=0;renderScreen(currentScreen);}
function navMonth(delta){dashboardMonthOffset+=delta;if(dashboardMonthOffset>0)dashboardMonthOffset=0;renderScreen(currentScreen);}
function showToast(msg,d=2400){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function showError(msg){const b=document.getElementById('errorBanner');if(!b)return;b.textContent=msg;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),5000);}
function updateCyclePill(){const day=new Date().getDay();const map={1:'Pedidos abiertos',2:'Hornear · Mar',3:'Entregas + pedidos',4:'Hornear · Jue',5:'Entregas hoy'};document.getElementById('cyclePill').textContent=map[day]||'Fin de semana';}
function updateStockBadge(){const total=ingredients.filter(i=>ingStatus(i)!=='ok').length;const b=document.getElementById('stockAlertBadge');if(!b)return;if(total>0){b.textContent=total;b.style.display='flex';}else b.style.display='none';}
function showScreen(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  (btn||document.getElementById('nav-'+name)).classList.add('active');
  currentScreen=name;renderScreen(name);
}
function renderScreen(name){const map={dashboard:renderDashboard,orders:renderOrders,new:renderNew,stock:renderStock,config:renderConfig};if(map[name])map[name]();}
function rerenderCurrent(){setTimeout(()=>renderScreen(currentScreen),50);}


// ── DASHBOARD SCREEN ──────────────────────────────────────────
function renderDashboard(){
  const el=document.getElementById('screen-dashboard');
  // calcular órdenes según vista
  let viewOrders, viewLabel, canNext=false;
  if(dashboardView==='week'){
    const wk=getOffsetWeekKey(dashboardWeekOffset);
    // Semana actual: incluir también pedidos activos de semanas anteriores
    viewOrders=dashboardWeekOffset===0?dashboardOrders(wk):weekOrders(wk);
    viewLabel=dashboardWeekOffset===0?'Esta semana':dashboardWeekOffset===-1?'Semana pasada':'Hace '+Math.abs(dashboardWeekOffset)+' semanas';
    canNext=dashboardWeekOffset<0;
  } else if(dashboardView==='month'){
    const{from,to,label}=getMonthRange(dashboardMonthOffset);
    viewOrders=ordersInRange(from,to);
    viewLabel=label;
    canNext=dashboardMonthOffset<0;
  } else {
    viewOrders=(customFrom&&customTo)?ordersInRange(customFrom,customTo):[];
    viewLabel=customFrom&&customTo?customFrom+' → '+customTo:'Seleccioná rango';
  }

  const active=activeOrders(viewOrders);
  const totalPanes=active.reduce((s,o)=>s+o.qty,0);
  const pct=Math.min(100,Math.round((totalPanes/MAX_SEMANA)*100));
  const slots=Array.from({length:MAX_SEMANA},(_,i)=>i<totalPanes);
  const cobrado=active.reduce((s,o)=>s+orderPaidAmount(o.id),0);
  const porCobrar=active.reduce((s,o)=>s+Math.max(0,o.qty*o.price-orderPaidAmount(o.id)),0);
  const alertas=ingredients.filter(i=>ingStatus(i)!=='ok');
  const isNow=dashboardView==='week'&&dashboardWeekOffset===0;

  // contar por stage
  const stageCounts={};
  STAGES.forEach(s=>stageCounts[s]=active.filter(o=>(o.stage||'recibido')===s).length);

  const navBtnStyle='background:rgba(255,255,255,0.14);border:0.5px solid rgba(255,255,255,0.25);color:var(--crema);border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;';
  const navBtnOff='opacity:0.25;background:transparent;border:0.5px solid rgba(255,255,255,0.1);color:var(--crema);border-radius:8px;width:34px;height:34px;font-size:16px;cursor:default;';

  const customFields=dashboardView==='custom'?`
    <div style="display:flex;gap:8px;margin-top:10px;">
      <input type="date" id="dash_from" value="${customFrom}" onchange="customFrom=this.value;renderDashboard()"
        style="flex:1;background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.25);color:var(--crema);border-radius:8px;padding:6px 10px;font-family:'Quicksand',sans-serif;font-size:12px;font-weight:600;outline:none;">
      <span style="color:var(--banano);line-height:32px;">→</span>
      <input type="date" id="dash_to" value="${customTo}" onchange="customTo=this.value;renderDashboard()"
        style="flex:1;background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.25);color:var(--crema);border-radius:8px;padding:6px 10px;font-family:'Quicksand',sans-serif;font-size:12px;font-weight:600;outline:none;">
    </div>`:'';

  el.innerHTML=`
    <div class="week-header">
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        ${['week','month','custom'].map(v=>`<button onclick="dashboardView='${v}';dashboardWeekOffset=0;dashboardMonthOffset=0;renderDashboard()"
          style="flex:1;padding:5px 4px;border-radius:8px;border:0.5px solid rgba(255,255,255,${dashboardView===v?'0.5':'0.2'});background:${dashboardView===v?'rgba(239,159,39,0.25)':'transparent'};color:${dashboardView===v?'var(--banano)':'rgba(250,238,218,0.6)'};font-family:'Quicksand',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;">
          ${v==='week'?'Semana':v==='month'?'Mes':'Rango'}
        </button>`).join('')}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <p class="wh-title">${viewLabel}</p>
        ${dashboardView!=='custom'?`<div style="display:flex;gap:6px;">
          <button onclick="${dashboardView==='week'?'navWeek(-1)':'navMonth(-1)'}" style="${navBtnStyle}">←</button>
          <button onclick="${dashboardView==='week'?'navWeek(1)':'navMonth(1)'}" ${!canNext?'disabled':''} style="${canNext?navBtnStyle:navBtnOff}">→</button>
        </div>`:''}
      </div>
      ${customFields}
    </div>

    ${shoppingList.length>0?`
    <div style="background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:14px;overflow:hidden;">
      <button id="shopToggleBtn" style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:none;border:none;cursor:pointer;font-family:'Quicksand',sans-serif;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;font-weight:700;color:var(--cacao);">🛒 Lista de compras</span>
          <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:${shoppingList.some(i=>i.status==='critico')?'var(--rojo)':'var(--amarillo)'};color:#fff;">${shoppingList.length}</span>
        </div>
        <span id="shopChevron" style="font-size:13px;color:var(--text-muted);transition:transform 0.2s;">${shoppingListOpen?'▲':'▼'}</span>
      </button>
      ${shoppingListOpen?`<div style="border-top:0.5px solid #F1EFE8;padding:0 14px;">
        ${[...shoppingList].sort((a,b)=>a.status==='critico'?-1:b.status==='critico'?1:0).map(i=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #F1EFE8;">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${i.status==='critico'?'var(--rojo)':'var(--amarillo)'}"></div>
              <div>
                <div style="font-size:13px;font-weight:600;color:var(--cacao);">${i.name}</div>
                <div style="font-size:11px;color:var(--text-muted);">Stock: ${i.stock} ${i.unit}${i.projStock!==undefined&&i.projStock!==i.stock?' → '+Math.max(0,i.projStock).toFixed(1)+' proy.':''} · Mín: ${i.min_stock} ${i.unit}</div>
              </div>
            </div>
            <button data-remove-id="${i.id}" style="font-size:18px;background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0 2px;flex-shrink:0;">×</button>
          </div>`).join('')}
        <div style="display:flex;gap:8px;padding:10px 0;">
          <button onclick="showScreen('stock',document.getElementById('nav-stock'))" style="flex:1;background:var(--crema);color:var(--cacao);border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:8px;font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">Ver stock →</button>
          <button onclick="clearShoppingList()" style="background:none;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:8px 12px;font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:var(--text-muted);">Limpiar</button>
        </div>
      </div>`:''}
    </div>`:''}

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${totalPanes}<span style="font-size:13px;color:var(--text-muted);">/${dashboardView==='week'?MAX_SEMANA:'∞'}</span></div><div class="stat-label">Panes</div><div class="stat-sub">${active.length} pedidos</div></div>
      <div class="stat-card"><div class="stat-val">${viewOrders.filter(o=>o.stage==='entregado').length}</div><div class="stat-label">Entregados</div><div class="stat-sub">${viewOrders.filter(o=>o.stage==='cancelado').length} cancelados</div></div>
      <div class="stat-card"><div class="stat-val" style="font-size:19px;color:var(--hoja);">${formatPrice(cobrado)}</div><div class="stat-label">Cobrado</div><div class="stat-sub">Todos los stages</div></div>
      <div class="stat-card"><div class="stat-val" style="font-size:19px;color:var(--rojo);">${formatPrice(porCobrar)}</div><div class="stat-label">Por cobrar</div><div class="stat-sub">Pendiente</div></div>
    </div>

    ${dashboardView==='week'?`<div class="capacity-bar-wrap">
      <div class="cap-row"><p class="cap-label">Capacidad semanal</p><p class="cap-count">${totalPanes}<span>/${MAX_SEMANA} panes</span></p></div>
      <div class="bar-track"><div class="bar-fill ${totalPanes>=MAX_SEMANA?'warn':''}" style="width:${pct}%"></div></div>

function renderOrders(){
  const STAGE_ORDER={recibido:0,horneado:1,enfriado:2,empacado:3,entregado:4,cancelado:5};
  const base=currentFilter==='all'?allOrders:allOrders.filter(o=>(o.stage||'recibido')===currentFilter);
  const sorted=[...base].sort((a,b)=>(STAGE_ORDER[a.stage||'recibido']??9)-(STAGE_ORDER[b.stage||'recibido']??9));
  const el=document.getElementById('screen-orders');
  const filters=['recibido','horneado','enfriado','empacado','entregado','cancelado','all'];
  el.innerHTML=`
    <div class="filter-row">
      ${filters.map(f=>`<button class="filter-chip ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">${f==='all'?'Todos':STAGE_LABEL[f]}</button>`).join('')}
    </div>
    ${sorted.length===0
      ?`<div class="empty-state"><div class="e-icon">📋</div><div class="e-title">Sin pedidos</div><div class="e-text">Usá el botón + para agregar.</div></div>`
      :sorted.map(o=>orderCardHTML(o)).join('')}
  `;
  el.querySelectorAll('.order-card').forEach(card=>card.addEventListener('click',()=>openOrderModal(card.dataset.id)));
}
function setFilter(f){currentFilter=f;renderOrders();}

function orderCardHTML(o){
  const prod=products.find(p=>p.id===o.product_id);
  const cycle=CYCLES.find(c=>c.id===o.cycle_id);
  const total=o.qty*o.price;
  const paid=orderPaidAmount(o.id);
  const stage=o.stage||'recibido';
  const sc=STAGE_COLOR[stage]||STAGE_COLOR.recibido;
  const isCancelled=stage==='cancelado';
  // mini pipeline
  const miniDots=STAGES.map((s,i)=>{
    const stageIdx=STAGES.indexOf(stage);
    const cls=isCancelled?'':i<stageIdx?'done':i===stageIdx?'current':'';
    const lineClass=isCancelled?'':i<stageIdx?'done':'';
    return(i>0?`<div class="mini-line ${lineClass}"></div>`:'')
      +`<div class="mini-dot ${isCancelled&&i===0?'cancelled':cls}"></div>`;
  }).join('');

  let payTag='';
  if(paid>=total)payTag=`<span class="tag tag-pagado">pagado</span>`;
  else if(paid>0)payTag=`<span class="tag tag-parcial">parcial</span>`;
  else payTag=`<span class="tag tag-sinpago">sin pago</span>`;

  return`<div class="order-card" data-id="${o.id}">
    <div class="order-card-top">
      <div class="order-avatar">${getInitials(o.client_name)}</div>
      <div class="order-body">
        <div class="order-name">${o.client_name}</div>
        <div class="order-detail">${prod?prod.name:''} × ${o.qty}<span class="order-cycle-badge">${cycle?cycle.label:o.cycle_id}</span></div>
        <div class="order-tags">
          <span class="tag" style="background:${sc.bg};color:${sc.color};">${STAGE_ICON[stage]} ${STAGE_LABEL[stage]}</span>
          ${payTag}${o.notes?'<span class="tag tag-prod">nota</span>':''}
        </div>
      </div>
      <div class="order-price">${formatPrice(total)}</div>
    </div>
    ${!isCancelled?`<div class="mini-stage">${miniDots}</div>`:''}
  </div>`;
}

  document.getElementById('fn_qty').textContent=newQty;updateTotal();
}

// ── STOCK — LISTA DE COMPRAS PROYECTADA ──────────────────────
function checkShoppingList(){
  // Sumar consumo proyectado de pedidos que aún no están horneados
  const pendientes=allOrders.filter(o=>['recibido'].includes(o.stage||'recibido'));
  // Calcular stock disponible proyectado por ingrediente
  const proyStock={};
  ingredients.forEach(i=>{proyStock[i.id]=i.stock;});
  pendientes.forEach(o=>{
    const recipe=productMaterials.filter(pm=>pm.product_id===o.product_id);
    recipe.forEach(pm=>{
      if(proyStock[pm.ingredient_id]!==undefined){
        proyStock[pm.ingredient_id]-=pm.qty_per_unit*o.qty;
      }
    });
  });
  // Detectar alertas según stock proyectado
  ingredients.forEach(i=>{
    const proj=proyStock[i.id]??i.stock;
    let status=null;
    if(proj<=i.min_stock) status='critico';
    else if(proj<=i.warn_stock) status='alerta';
    if(status){
      const existing=shoppingList.findIndex(x=>x.id===i.id);
      const item={id:i.id,name:i.name,unit:i.unit,stock:i.stock,projStock:Math.max(0,proj),min_stock:i.min_stock,warn_stock:i.warn_stock,status};
      if(existing>=0) shoppingList[existing]=item;
      else shoppingList.push(item);
    } else {
      // Si ya no hay alerta proyectada, quitar de la lista
      shoppingList=shoppingList.filter(x=>x.id!==i.id);
    }
  });
}

// ── STOCK — REBAJO AUTOMÁTICO ─────────────────────────────────
async function rebajarStock(productId, qty){
  // Obtener receta del producto
  const recipe=productMaterials.filter(pm=>pm.product_id===productId);
  if(recipe.length===0)return; // sin receta configurada
  const alertas=[];
  for(const pm of recipe){
    const ing=ingredients.findIndex(x=>x.id===pm.ingredient_id);
    if(ing<0)continue;
    const consumo=pm.qty_per_unit*qty;
    const newStock=Math.max(0,ingredients[ing].stock-consumo);
    // Actualizar en Supabase
    await sb.from('ingredients').update({stock:newStock}).eq('id',pm.ingredient_id);
    // Registrar movimiento
    await sb.from('stock_movements').insert({ingredient_id:pm.ingredient_id,type:'uso',qty:-consumo});
    // Actualizar local
    ingredients[ing]={...ingredients[ing],stock:newStock};
    // Verificar alerta
    const st=ingStatus(ingredients[ing]);
    if(st!=='ok')alertas.push({name:ingredients[ing].name,status:st,stock:newStock,unit:ingredients[ing].unit});
  }
  updateStockBadge();
  // Recalcular lista de compras con nuevo stock
  checkShoppingList();
  return alertas;
}

async function saveOrder(){

  const phone=document.getElementById('fn_phone').value.trim();
  const productId=document.getElementById('fn_product').value;
  const cycleId=document.getElementById('fn_cycle').value;

  if(!name){showToast('⚠️ Ingresá el nombre del cliente');return;}
  const prod=products.find(p=>p.id===productId);
  const btn=document.getElementById('btnSaveOrder');
  btn.disabled=true;btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px;border-color:var(--banano);border-top-color:transparent;"></div> Guardando...';
  try{
    const dateEl=document.getElementById('fn_date');
    const orderDate=dateEl?dateEl.value:new Date().toISOString().slice(0,10);
    const weekKey=getWeekKey(new Date(orderDate+'T12:00:00'));
    const{data:newOrder,error}=await sb.from('orders').insert({
      client_name:name,client_phone:phone||null,product_id:productId,
      qty:newQty,price:prod.price,cycle_id:cycleId,notes:notes||null,
      stage:'recibido',week_key:weekKey,order_date:orderDate
    }).select().single();
    if(error)throw error;
    if(newOrder)allOrders.unshift(newOrder);
    // Verificar stock proyectado para pedidos pendientes → lista de compras
    checkShoppingList();
    showToast('✓ Pedido guardado');
    newQty=1;
    // Navegar al dashboard mostrando la semana del pedido recién creado
    const newOrderWeek=getWeekKey(new Date(orderDate+'T12:00:00'));
    const thisWeek=getWeekKey();
    const diffMs=new Date(thisWeek)-new Date(newOrderWeek);
    dashboardWeekOffset=-Math.round(diffMs/(7*24*60*60*1000));
    dashboardView='week';
    showScreen('dashboard',document.getElementById('nav-dashboard'));
    renderDashboard(); // forzar re-render inmediato con datos actualizados
  }catch(e){showError('Error: '+e.message);btn.disabled=false;btn.innerHTML='Guardar pedido';}
}

async function avanzarStage(){
  const o=allOrders.find(x=>x.id===currentOrderId);if(!o)return;
  const stage=o.stage||'recibido';
  const idx=STAGES.indexOf(stage);
  if(idx<0||idx>=STAGES.length-1)return;
  const next=STAGES[idx+1];
  const btn=event.target;btn.disabled=true;btn.textContent='Actualizando...';
  try{
    const{error}=await sb.from('orders').update({stage:next}).eq('id',currentOrderId);
    if(error)throw error;
    const oi=allOrders.findIndex(x=>x.id===currentOrderId);
    if(oi>=0)allOrders[oi]={...allOrders[oi],stage:next};
    // Rebajar stock al hornear
    if(next==='horneado'){
      await rebajarStock(o.product_id,o.qty);
    }
    closeModal();showToast(`✓ ${STAGE_LABEL[next]}`);rerenderCurrent();
  }catch(e){showError('Error: '+e.message);btn.disabled=false;btn.textContent='→ Marcar como '+STAGE_LABEL[next];}
}

function setPayMethod(m,btn){paymentMethod=m;document.querySelectorAll('.method-pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');}

async function registrarPago(){
  const amount=parseInt(document.getElementById('payAmount').value);
  if(!amount||amount<=0){showToast('⚠️ Ingresá un monto válido');return;}
  const btn=event.target;btn.disabled=true;btn.textContent='Guardando...';
  try{
    const{error}=await sb.from('payments').insert({order_id:currentOrderId,amount,method:paymentMethod});
    if(error)throw error;
    allPayments.unshift({id:crypto.randomUUID(),order_id:currentOrderId,amount,method:paymentMethod,payment_date:new Date().toISOString().slice(0,10),created_at:new Date().toISOString()});
    closeModal();showToast('✓ Pago registrado');rerenderCurrent();
  }catch(e){showError('Error: '+e.message);btn.disabled=false;btn.textContent='✓ Registrar pago';}
}

async function cancelarPedido(){
  if(!confirm('¿Cancelar este pedido?'))return;
  try{
    const{error}=await sb.from('orders').update({stage:'cancelado'}).eq('id',currentOrderId);
    if(error)throw error;
    const oi=allOrders.findIndex(x=>x.id===currentOrderId);
    if(oi>=0)allOrders[oi]={...allOrders[oi],stage:'cancelado'};
    closeModal();showToast('Pedido cancelado');rerenderCurrent();
  }catch(e){showError('Error: '+e.message);}
}

async function eliminarPedido(){
  const o=allOrders.find(x=>x.id===currentOrderId);if(!o)return;
  if(!confirm(`¿Eliminar el pedido de ${o.client_name} permanentemente?\nEsta acción no se puede deshacer.`))return;
  try{
    // Devolver stock según receta
    const recipe=productMaterials.filter(pm=>pm.product_id===o.product_id);
    for(const pm of recipe){
      const idx=ingredients.findIndex(x=>x.id===pm.ingredient_id);
      if(idx<0)continue;
      const devolucion=pm.qty_per_unit*o.qty;
      const newStock=ingredients[idx].stock+devolucion;
      await sb.from('ingredients').update({stock:newStock}).eq('id',pm.ingredient_id);
      await sb.from('stock_movements').insert({ingredient_id:pm.ingredient_id,type:'ajuste',qty:devolucion});
      ingredients[idx]={...ingredients[idx],stock:newStock};
    }
    await sb.from('payments').delete().eq('order_id',currentOrderId);
    const{error}=await sb.from('orders').delete().eq('id',currentOrderId);
    if(error)throw error;
    allOrders=allOrders.filter(x=>x.id!==currentOrderId);
    allPayments=allPayments.filter(x=>x.order_id!==currentOrderId);
    updateStockBadge();
    closeModal();showToast('🗑 Pedido eliminado — stock devuelto');rerenderCurrent();
  }catch(e){showError('Error al eliminar: '+e.message);}
}

function openWhatsApp(){
  const o=allOrders.find(x=>x.id===currentOrderId);if(!o||!o.client_phone)return;
  const prod=products.find(p=>p.id===o.product_id);
  const cycle=CYCLES.find(c=>c.id===o.cycle_id);
  const clean=o.client_phone.replace(/\D/g,'');
  const firstName=o.client_name.trim().split(' ')[0];
  const notaLinea=o.notes?`\n📝 ${o.notes}`:'';
  const msg=encodeURIComponent(`Hola ${firstName}, Confirmamos la entrega de tu pedido de Bananísimo 🍌:\n📦 ${prod?.name||''} × ${o.qty}\n💰 Total: ${formatPrice(o.qty*o.price)}\n📅 Entrega: ${cycle?cycle.entrega:'coordinamos'}${notaLinea}\nCompartinos tu ubicación para recibir tu orden📍 ¡Que estés muy bien! 🤎`);
  window.open(`https://wa.me/506${clean}?text=${msg}`,'_blank');
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.remove('open');
}

// ── EDIT PANEL ────────────────────────────────────────────────
function openEditPanel(){
  const o=allOrders.find(x=>x.id===currentOrderId);if(!o)return;
  const pagos=orderPayments(currentOrderId);
  const orderDate=o.order_date||o.created_at.slice(0,10);

    <p class="modal-title" style="margin-bottom:16px;">✏️ Editar pedido</p>
    <p style="font-size:13px;font-weight:700;color:var(--cacao);margin-bottom:12px;">${o.client_name}</p>

    <div class="form-group"><label class="form-label">Stage</label>
      <div class="stage-selector">
        ${[...STAGES,'cancelado'].map(s=>{

          return`<button class="stage-opt ${isActive?'active':''}" data-stage="${s}"
            style="${isActive?`background:${sc.bg};color:${sc.color};border-color:${sc.color};`:''}"
            onclick="selectEditStage(this,'${s}')">${STAGE_ICON[s]} ${STAGE_LABEL[s]}</button>`;
        }).join('')}
      </div>
    </div>

    <div class="form-group"><label class="form-label">Producto</label>
      <select class="form-input" id="edit_product">
        ${products.map(p=>`<option value="${p.id}" ${o.product_id===p.id?'selected':''}>${p.name} — ${formatPrice(p.price)}</option>`).join('')}
      </select>
    </div>

    <div class="form-group"><label class="form-label">Cantidad (loafs)</label>
      <input class="form-input" id="edit_qty" type="number" min="1" max="${MAX_SEMANA}" value="${o.qty}">
    </div>

    <div class="form-group"><label class="form-label">Teléfono / WhatsApp</label>
      <input class="form-input" id="edit_phone" type="tel" value="${o.client_phone||''}" placeholder="8888-8888">
    </div>

    <div class="form-group"><label class="form-label">Fecha del pedido</label>
      <input class="form-input" id="edit_date" type="date" value="${orderDate}" max="${today}">
    </div>

    <div class="form-group"><label class="form-label">Ciclo de entrega</label>
      <select class="form-input" id="edit_cycle">
        ${CYCLES.map(c=>`<option value="${c.id}" ${o.cycle_id===c.id?'selected':''}>${c.label} → entrega ${c.entrega}</option>`).join('')}
      </select>
    </div>

    <div class="form-group"><label class="form-label">Notas</label>
      <input class="form-input" id="edit_notes" type="text" value="${o.notes||''}" placeholder="Sin notas">
    </div>

    ${pagos.length>0?`<div class="form-group"><label class="form-label">Fecha de pagos</label>
      <div style="background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;">
        ${pagos.map(p=>`<div class="payment-row" style="align-items:center;">
          <div><div class="payment-method">${METODOS[p.method]||p.method} · ${formatPrice(p.amount)}</div></div>
          <input type="date" id="edit_pay_${p.id}" value="${(p.payment_date||p.created_at.slice(0,10))}"
            style="border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:5px 8px;font-family:'Quicksand',sans-serif;font-size:12px;font-weight:600;color:var(--text);background:var(--white);outline:none;max-width:140px;">
        </div>`).join('')}
      </div>
    </div>`:''}

    <div class="modal-actions">

      <button class="btn-close-modal" onclick="openOrderModal(currentOrderId)">← Volver</button>

let editStageSelected=null;
function selectEditStage(btn,stage){
  editStageSelected=stage;
  document.querySelectorAll('.stage-opt').forEach(b=>{
    b.classList.remove('active');
    b.style.background='';b.style.color='';b.style.borderColor='';
  });
  const sc=STAGE_COLOR[stage];
  btn.classList.add('active');
  btn.style.background=sc.bg;btn.style.color=sc.color;btn.style.borderColor=sc.color;
}

async function saveOrderEdit(){
  const o=allOrders.find(x=>x.id===currentOrderId);if(!o)return;
  const btn=event.target;btn.disabled=true;btn.textContent='Guardando...';
  try{
    const newProduct=document.getElementById('edit_product').value;
    const newQty=parseInt(document.getElementById('edit_qty').value)||o.qty;
    const newPhone=document.getElementById('edit_phone').value.trim();
    const newDate=document.getElementById('edit_date').value;
    const newCycle=document.getElementById('edit_cycle').value;
    const newNotes=document.getElementById('edit_notes').value.trim();
    const newWeekKey=getWeekKey(newDate);
    const newStage=editStageSelected||(o.stage||'recibido');
    const newPrice=(products.find(p=>p.id===newProduct)||{price:o.price}).price;

    // Ajustar stock si cambió producto o cantidad
    const productChanged=newProduct!==o.product_id;
    const qtyChanged=newQty!==o.qty;
    if(productChanged||qtyChanged){
      // Devolver stock del pedido original
      const oldRecipe=productMaterials.filter(pm=>pm.product_id===o.product_id);
      for(const pm of oldRecipe){
        const idx=ingredients.findIndex(x=>x.id===pm.ingredient_id);
        if(idx<0)continue;
        const devolucion=pm.qty_per_unit*o.qty;
        const restored=ingredients[idx].stock+devolucion;
        await sb.from('ingredients').update({stock:restored}).eq('id',pm.ingredient_id);
        ingredients[idx]={...ingredients[idx],stock:restored};
      }
      // Descontar stock del nuevo pedido
      const newRecipe=productMaterials.filter(pm=>pm.product_id===newProduct);
      for(const pm of newRecipe){
        const idx=ingredients.findIndex(x=>x.id===pm.ingredient_id);
        if(idx<0)continue;
        const consumo=pm.qty_per_unit*newQty;
        const newStock=Math.max(0,ingredients[idx].stock-consumo);
        await sb.from('ingredients').update({stock:newStock}).eq('id',pm.ingredient_id);
        await sb.from('stock_movements').insert({ingredient_id:pm.ingredient_id,type:'uso',qty:-consumo});
        ingredients[idx]={...ingredients[idx],stock:newStock};
      }
      updateStockBadge();
    }

    const{error:eo}=await sb.from('orders').update({
      product_id:newProduct,qty:newQty,price:newPrice,
      client_phone:newPhone||null,
      order_date:newDate,cycle_id:newCycle,notes:newNotes||null,
      week_key:newWeekKey,stage:newStage,
    }).eq('id',currentOrderId);
    if(eo)throw eo;

    // Actualizar fechas de pagos
    const pagos=orderPayments(currentOrderId);
    for(const p of pagos){
      const el=document.getElementById('edit_pay_'+p.id);
      if(!el)continue;
      const newPayDate=el.value;
      if(newPayDate&&newPayDate!==(p.payment_date||p.created_at.slice(0,10))){
        await sb.from('payments').update({payment_date:newPayDate}).eq('id',p.id);
        const pi=allPayments.findIndex(x=>x.id===p.id);
        if(pi>=0)allPayments[pi]={...allPayments[pi],payment_date:newPayDate};
      }
    }

    const oi=allOrders.findIndex(x=>x.id===currentOrderId);
    if(oi>=0)allOrders[oi]={...allOrders[oi],product_id:newProduct,qty:newQty,price:newPrice,client_phone:newPhone||null,order_date:newDate,cycle_id:newCycle,notes:newNotes||null,week_key:newWeekKey,stage:newStage};
    editStageSelected=null;
    showToast('✓ Pedido actualizado');openOrderModal(currentOrderId);rerenderCurrent();
  }catch(e){showError('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar cambios';}
}

// ── STOCK SCREEN ──────────────────────────────────────────────
function renderStock(){
  const filtered=ingredients.filter(i=>(i.category||'ingrediente')===stockTab);
  const criticos=filtered.filter(i=>ingStatus(i)==='critico');
  const alertas=filtered.filter(i=>ingStatus(i)==='alerta');
  const ok=filtered.filter(i=>ingStatus(i)==='ok');
  const sorted=[...criticos,...alertas,...ok];
  const el=document.getElementById('screen-stock');
  el.innerHTML=`
    <div class="view-tabs" style="margin-bottom:12px;">
      <button class="view-tab ${stockTab==='ingrediente'?'active':''}" onclick="stockTab='ingrediente';renderStock()">🌾 Ingredientes</button>
      <button class="view-tab ${stockTab==='material'?'active':''}" onclick="stockTab='material';renderStock()">📦 Materiales</button>
    </div>
    ${criticos.length>0?`<div class="alert-banner" style="cursor:default;">
      <div class="alert-banner-title">🔴 ${criticos.length} ${stockTab==='ingrediente'?'ingrediente':'material'}${criticos.length>1?'s':''} en nivel crítico</div>
      <div class="alert-banner-text">Reposición urgente antes de producir.</div>
    </div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span class="sec-label" style="margin:0;">${stockTab==='ingrediente'?'Ingredientes':'Materiales'} (${sorted.length})</span>
      <div style="display:flex;gap:8px;font-size:11px;font-weight:700;">
        <span style="color:var(--rojo);">🔴 ${criticos.length}</span>
        <span style="color:var(--amarillo);">🟡 ${alertas.length}</span>
        <span style="color:var(--hoja);">🟢 ${ok.length}</span>
      </div>
    </div>
    ${sorted.map(i=>{
      const st=ingStatus(i);
      const max=Math.max(i.warn_stock*1.5,i.stock,1);
      const pct=Math.min(100,Math.round((i.stock/max)*100));
      return`<div class="ing-card status-${st}" data-id="${i.id}">
        <div class="ing-top">
          <div><div class="ing-name">${i.name}</div><div class="ing-meta">${i.cost_per_unit?formatPrice(i.cost_per_unit)+' / '+i.unit:''}</div></div>
          <div class="ing-stock-val ${st}">${i.stock} ${i.unit}</div>
        </div>
        <div class="ing-bar-track"><div class="ing-bar-fill ${st}" style="width:${pct}%"></div></div>
        <div class="ing-bottom"><span>Mín: ${i.min_stock} ${i.unit}</span><span>Alerta: ${i.warn_stock} ${i.unit}</span></div>
      </div>`;
    }).join('')}
    ${sorted.length===0?`<div class="empty-state"><div class="e-icon">📦</div><div class="e-title">Sin ${stockTab==='ingrediente'?'ingredientes':'materiales'}</div></div>`:''}
  `;
  el.querySelectorAll('.ing-card').forEach(card=>card.addEventListener('click',()=>openIngModal(card.dataset.id)));
}

function openIngModal(ingId){
  currentIngId=ingId;ingMoveType='compra';
  const i=ingredients.find(x=>x.id===ingId);if(!i)return;
  const st=ingStatus(i);
  const stLabel={critico:'🔴 Crítico',alerta:'🟡 Alerta',ok:'🟢 OK'}[st];
  document.getElementById('modalContent').innerHTML=`
    <p class="modal-title">${i.name}</p>
    <p class="modal-sub">${i.notes||''}</p>
    <div class="modal-row"><span class="modal-row-label">Stock actual</span><span class="modal-row-val" style="color:${st==='critico'?'var(--rojo)':st==='alerta'?'var(--amarillo)':'var(--hoja)'};">${i.stock} ${i.unit}</span></div>
    <div class="modal-row"><span class="modal-row-label">Estado</span><span class="modal-row-val">${stLabel}</span></div>
    <div class="modal-row"><span class="modal-row-label">Nivel crítico</span><span class="modal-row-val">${i.min_stock} ${i.unit}</span></div>
    <div class="modal-row"><span class="modal-row-label">Nivel de alerta</span><span class="modal-row-val">${i.warn_stock} ${i.unit}</span></div>
    ${i.cost_per_unit?`<div class="modal-row"><span class="modal-row-label">Costo / ${i.unit}</span><span class="modal-row-val">${formatPrice(i.cost_per_unit)}</span></div>`:''}
    <div style="margin-top:16px;padding-top:14px;border-top:0.5px solid #F1EFE8;">
      <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Actualizar stock</p>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <button class="filter-chip active" onclick="setIngMoveType('compra',this)">+ Compra</button>
        <button class="filter-chip" onclick="setIngMoveType('uso',this)">− Uso</button>
        <button class="filter-chip" onclick="setIngMoveType('ajuste',this)">Ajuste</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input class="form-input" id="ingQtyInput" type="number" placeholder="Cantidad (${i.unit})" style="flex:1;margin:0;">
        <button class="btn-primary" style="width:auto;padding:11px 16px;flex-shrink:0;" onclick="saveIngMovement()">Guardar</button>
      </div>
      <p id="ingMoveHint" style="font-size:11px;color:var(--text-muted);margin-top:6px;">Suma al stock actual.</p>
    </div>
    <div class="modal-actions"><button class="btn-close-modal" onclick="closeModal()">Cerrar</button></div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}
function setIngMoveType(type,btn){
  ingMoveType=type;
  document.querySelectorAll('#modalContent .filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const hints={compra:'Suma al stock actual.',uso:'Resta del stock actual.',ajuste:'Reemplaza el stock con el valor ingresado.'};
  const h=document.getElementById('ingMoveHint');if(h)h.textContent=hints[type];
}
async function saveIngMovement(){
  const qty=parseFloat(document.getElementById('ingQtyInput').value);
  if(!qty||qty<=0){showToast('⚠️ Ingresá una cantidad válida');return;}
  const i=ingredients.find(x=>x.id===currentIngId);if(!i)return;
  const newStock=ingMoveType==='compra'?i.stock+qty:ingMoveType==='uso'?Math.max(0,i.stock-qty):qty;
  try{
    const{error}=await sb.from('ingredients').update({stock:newStock}).eq('id',currentIngId);
    if(error)throw error;
    await sb.from('stock_movements').insert({ingredient_id:currentIngId,type:ingMoveType,qty:ingMoveType==='uso'?-qty:qty});
    const idx=ingredients.findIndex(x=>x.id===currentIngId);
    if(idx>=0)ingredients[idx]={...ingredients[idx],stock:newStock};
    closeModal();updateStockBadge();showToast('✓ Stock actualizado');rerenderCurrent();
  }catch(e){showError('Error: '+e.message);}
}

// ── FINANCE SCREEN ────────────────────────────────────────────

// ── CONFIG SCREEN ─────────────────────────────────────────────
function renderConfig(){
  const{url}=loadConfig();
  const el=document.getElementById('screen-config');
  el.innerHTML=`
    <div style="text-align:center;padding:6px 0 10px;">
      <a href="/bananisimo/finanzas/" style="font-size:13px;font-weight:700;color:var(--dorado);text-decoration:none;">💰 Abrir app de Finanzas →</a>
    </div>
    <span class="sec-label">Recetas por producto</span>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;line-height:1.6;">Definí cuántas unidades de cada ingrediente/material se usan por loaf. El stock se rebajará automáticamente al crear un pedido.</p>
    ${products.map(p=>{
      const recipe=productMaterials.filter(pm=>pm.product_id===p.id);
      const recipeItems=recipe.map(pm=>{
        const ing=ingredients.find(i=>i.id===pm.ingredient_id);
        return ing?`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid #F1EFE8;">
          <span style="font-size:12px;color:var(--text);">${ing.name}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:12px;font-weight:700;color:var(--cacao);">${pm.qty_per_unit} ${ing.unit}</span>
            <button onclick="removeRecipeItem('${pm.id}')" style="background:#fde8e8;color:#922b21;border:none;border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;">×</button>
          </div>
        </div>`:'';
      }).join('');
      return`<div class="card" style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--cacao);">${p.name}</div>
            <div style="font-size:12px;color:var(--text-muted);">${formatPrice(p.price)}</div>
          </div>
          <button onclick="openRecipeEditor('${p.id}')"
            style="background:var(--crema);color:var(--cacao);border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:6px 12px;font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">
            + Agregar
          </button>
        </div>
        ${recipe.length===0
          ?`<p style="font-size:12px;color:var(--text-muted);font-style:italic;">Sin receta configurada</p>`
          :recipeItems}
      </div>`;
    }).join('')}
    <span class="sec-label" style="margin-top:16px;">Conexión Supabase</span>
    <div class="card">
      <p style="font-size:12px;font-weight:700;color:var(--cacao);word-break:break-all;margin-bottom:12px;">${url||'No configurado'}</p>
      <button onclick="resetConfig()" style="font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;padding:10px 16px;border-radius:var(--radius-sm);border:0.5px solid var(--border-strong);background:transparent;cursor:pointer;color:var(--cacao);width:100%;">Reconfigurar conexión</button>
    </div>
  `;
}
function resetConfig(){if(!confirm('¿Borrar las credenciales?'))return;localStorage.removeItem('sb_url');localStorage.removeItem('sb_key');location.reload();}

// ── EDITOR DE RECETAS ─────────────────────────────────────────
let editingProductId=null;
function openRecipeEditor(productId){
  editingProductId=productId;
  const p=products.find(x=>x.id===productId);
  const existing=productMaterials.filter(pm=>pm.product_id===productId).map(pm=>pm.ingredient_id);
  const available=ingredients.filter(i=>!existing.includes(i.id));
  document.getElementById('modalContent').innerHTML=`
    <p class="modal-title" style="margin-bottom:4px;">Receta — ${p?.name}</p>
    <p class="modal-sub">Cantidad por loaf</p>
    <div class="form-group"><label class="form-label">Ingrediente / Material</label>
      <select class="form-input" id="recipe_ing">
        <option value="">— Seleccioná —</option>
        ${available.map(i=>`<option value="${i.id}">${i.name} (${i.unit})</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label class="form-label">Cantidad por loaf</label>
      <input class="form-input" id="recipe_qty" type="number" step="0.1" placeholder="Ej: 1, 2.5, 30">
    </div>
    <div class="modal-actions">
      <button class="btn-status btn-next" onclick="saveRecipeItem()">Agregar a receta</button>
      <button class="btn-close-modal" onclick="closeModal();renderConfig();">Volver</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}
async function saveRecipeItem(){
  const ingId=document.getElementById('recipe_ing').value;
  const qty=parseFloat(document.getElementById('recipe_qty').value);
  if(!ingId){showToast('⚠️ Seleccioná un ingrediente');return;}
  if(!qty||qty<=0){showToast('⚠️ Ingresá una cantidad válida');return;}
  const btn=event.target;btn.disabled=true;btn.textContent='Guardando...';
  try{
    const{data,error}=await sb.from('product_materials').insert({
      product_id:editingProductId,ingredient_id:ingId,qty_per_unit:qty
    }).select().single();
    if(error)throw error;
    productMaterials.push(data);
    showToast('✓ Ingrediente agregado');
    closeModal();renderConfig();
  }catch(e){showError('Error: '+e.message);btn.disabled=false;btn.textContent='Agregar a receta';}
}
async function removeRecipeItem(pmId){
  if(!confirm('¿Quitar este ingrediente de la receta?'))return;
  try{
    const{error}=await sb.from('product_materials').delete().eq('id',pmId);
    if(error)throw error;
    productMaterials=productMaterials.filter(pm=>pm.id!==pmId);
    renderConfig();showToast('✓ Ingrediente quitado');
  }catch(e){showError('Error: '+e.message);}
}

// ── SERVICE WORKER ────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/bananisimo/pedidos/sw.js',{scope:'/bananisimo/pedidos/'}).then(reg=>{
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller)showToast('🍌 Nueva versión disponible — recargá la app',6000);
        });
      });
    });
  });
}

initApp();
